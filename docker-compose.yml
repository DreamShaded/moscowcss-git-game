services:
  stack-gitdoka:
    build:
      context: .
      dockerfile: Dockerfile
      # Use host network so npm inside the builder reaches xray on 127.0.0.1:1081
      network: host
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1}
    image: stack-gitdoka:${APP_VERSION:-latest}
    pull_policy: build
    container_name: stack-gitdoka-app
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"

      - "traefik.http.middlewares.stack-gitdoka-headers.headers.customrequestheaders.X-Forwarded-Port=443"
      - "traefik.http.middlewares.stack-gitdoka-headers.headers.customrequestheaders.X-Forwarded-Proto=https"

      - "traefik.http.routers.stack-gitdoka.rule=Host(`${APP_DOMAIN}`) || Host(`www.${APP_DOMAIN}`)"
      - "traefik.http.routers.stack-gitdoka.service=stack-gitdoka"
      - "traefik.http.routers.stack-gitdoka.entrypoints=websecure"
      - "traefik.http.routers.stack-gitdoka.tls=true"
      - "traefik.http.routers.stack-gitdoka.tls.certresolver=mainResolver"
      - "traefik.http.services.stack-gitdoka.loadbalancer.server.port=80"
      - "traefik.http.routers.stack-gitdoka.middlewares=stack-gitdoka-headers@docker,redirect-to-https@file,unwww@file"

networks:
  traefik_net:
    external: true
