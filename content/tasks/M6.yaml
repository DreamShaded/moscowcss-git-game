id: M6
title: "Поломанный merge, нужно прервать"
difficulty: medium
points: 3
maxCommands: 3

inGame:
  story: |
    Начал git merge main, 30 конфликтов в CSS, rebase был бы чище.
  goal: "Прервать merge, сделать rebase."
  bank:
    commands: [merge, rebase, reset]
    flags: ["--abort", "--hard"]
    args: ["main", "HEAD"]
    decoys:
      - "git revert MERGE_HEAD"
      - "git stash"
    prebuilt:
      - "git merge --abort"
      - "git reset --hard HEAD"
      - "git rebase main"

  validSolutions:
    - kind: ideal
      label: "merge --abort + rebase"
      sequence:
        - step: "git merge --abort"
        - step: "git rebase main"
    - kind: standard
      label: "reset + rebase"
      sequence:
        - step: "git reset --hard HEAD"
        - step: "git rebase main"

  pointsModifiers:
    bonuses:
      - condition: { type: usesFlag, flag: "--abort" }
        points: 1
        reason: "merge --abort — корректный способ"
    penalties: []

  forbiddenCommands: []
  hints:
    - "merge --abort откатывает и очищает state-файлы."

knowledge:
  explanation: |
    Во время merge git хранит MERGE_HEAD и MERGE_MSG. merge --abort их подчищает.
  solutionsCommentary: []
  aliases: []
  relatedKnowledge: [merge-state-files, abort-vs-reset]
  externalLinks: []
