id: M10
title: "ORIG_HEAD после неудачного rebase"
difficulty: medium
points: 3
maxCommands: 2

inGame:
  story: |
    Запустил git rebase main на feature/forms — хотел линейную историю.
    Начал разрешать конфликты, решил половину, а потом понял что подход неверный:
    нужно было сначала поговорить с Алёной о стратегии. git rebase --abort уже
    не поможет — ты уже продвинулся в середину rebase и сделал несколько коммитов.
    Нужно вернуться в точку до rebase.
  goal: "Вернуть ветку feature/forms в состояние до начала rebase."

  bank:
    commands: [reset, reflog]
    flags: ["--hard"]
    args: ["ORIG_HEAD", "HEAD@{1}", "abc123"]
    decoys:
      - "git rebase --abort"
    prebuilt:
      - "git reset --hard ORIG_HEAD"
      - "git reset --hard HEAD@{1}"
      - "git reflog"
      - "git reset --hard abc123"

  validSolutions:
    - kind: ideal
      label: "reset ORIG_HEAD"
      sequence:
        - step: "git reset --hard ORIG_HEAD"
    - kind: standard
      label: "reflog + reset"
      sequence:
        - step: "git reflog"
        - step: "git reset --hard abc123"

  forbiddenCommands: []

  pointsModifiers:
    bonuses:
      - condition: { type: usesArg, arg: "ORIG_HEAD" }
        points: 2
        reason: "ORIG_HEAD — прямой путь без reflog"
    penalties: []

  hints:
    - "rebase выставляет ORIG_HEAD на pre-rebase позицию при старте."

knowledge:
  explanation: |
    ORIG_HEAD выставляется reset, merge, rebase, pull перед опасной операцией.
    После rebase, даже незавершённого, он указывает на коммит до начала операции.
  solutionsCommentary:
    - solutionLabel: "reset ORIG_HEAD"
      commentary: |
        Одна команда: ORIG_HEAD выставляется в начале rebase и остаётся там, пока
        другая "опасная" операция его не перезапишет. Знание этого спасает
        в ситуациях когда --abort уже не вариант.
    - solutionLabel: "reflog + reset"
      commentary: |
        Универсальный путь: reflog показывает все позиции HEAD с временными метками
        и описанием операции (rebase-start, rebase-pick и т.д.). Находишь строку
        до начала rebase — берёшь хэш для reset --hard.
  aliases: []
  relatedKnowledge: [orig-head-when-set, rebase-recovery]
  externalLinks:
    - { title: "git-reflog(1)", url: "https://git-scm.com/docs/git-reflog" }
    - { title: "git-reset(1)", url: "https://git-scm.com/docs/git-reset" }
