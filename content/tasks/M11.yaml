id: M11
title: "Pickaxe: найти коммиты, трогавшие !important"
difficulty: medium
points: 3
maxCommands: 2

inGame:
  story: |
    Витя добавлял/удалял !important в .btn-primary за последний месяц.
    Найти все коммиты, где количество вхождений менялось.
  goal: "Запустить правильную команду."
  bank:
    commands: [log, blame, grep]
    flags: ["-S", "-G", "--grep", "--"]
    args: ['"!important"', "styles/button.css"]
    decoys:
      - "git log --grep"
      - "git blame"
    prebuilt:
      - 'git log -S "!important" -- styles/button.css'
      - 'git log -G "!important" -- styles/button.css'

  validSolutions:
    - kind: ideal
      label: "log -S"
      sequence:
        - step: 'git log -S "!important" -- styles/button.css'
    - kind: standard
      label: "log -G"
      sequence:
        - step: 'git log -G "!important" -- styles/button.css'

  hints:
    - "-S ищет изменения количества вхождений; -G — любые изменения совпадающих строк."

knowledge:
  explanation: |
    Pickaxe (-S/-G) — search в diff'ах, а не в commit message (как --grep).
  solutionsCommentary: []
  aliases: []
  relatedKnowledge: [pickaxe-vs-grep, log-L-function-history]
  externalLinks: []
