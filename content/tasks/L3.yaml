id: L3
title: "Опечатка в сообщении коммита"
difficulty: easy
points: 1
maxCommands: 3

inGame:
  story: |
    Закоммитил правку ховера в кнопке и написал "fix buton hover state" — без второй t.
    Ещё не пушил, так что исправить реально. Елена всё равно прочитает лог перед аппрувом,
    и такое она точно прокомментирует.
  goal: "Исправить сообщение последнего коммита."

  bank:
    commands: [commit, rebase, reset]
    flags: ["--amend", "--soft", "-i", "-m"]
    args: ['"fix button hover state"', "HEAD~1"]
    decoys:
      - "git rebase -i HEAD~1"
    prebuilt:
      - 'git commit --amend -m "fix button hover state"'
      - "git reset --soft HEAD~1"
      - 'git commit -m "fix button hover state"'

  validSolutions:
    - kind: ideal
      label: "amend одной командой"
      sequence:
        - step: 'git commit --amend -m "fix button hover state"'
    - kind: long
      label: "reset --soft + новый коммит"
      sequence:
        - step: "git reset --soft HEAD~1"
        - step: 'git commit -m "fix button hover state"'

  forbiddenCommands: []

  pointsModifiers:
    bonuses: []
    penalties: []

  hints:
    - "Есть команда специально для исправления последнего коммита."

knowledge:
  explanation: |
    git commit --amend заменяет HEAD-коммит. Если коммит уже запушен — после amend нужен
    --force-with-lease. Тут не пушили, так что всё чисто.
  solutionsCommentary:
    - solutionLabel: "amend одной командой"
      commentary: |
        Самый короткий путь: --amend заменяет последний коммит новым. С -m не нужно
        открывать редактор — просто передаёшь исправленное сообщение прямо в команде.
    - solutionLabel: "reset --soft + новый коммит"
      commentary: |
        Длиннее, но понятнее: reset --soft откатывает коммит, оставляя изменения в индексе,
        затем делаешь новый коммит с правильным сообщением. Вариант для тех, кто не знает --amend.
  aliases: []
  relatedKnowledge: [amend-after-push, commit-fixup-autosquash]
  externalLinks:
    - { title: "git-commit(1)", url: "https://git-scm.com/docs/git-commit" }
