id: L5
title: "Откатить файл к версии в main"
difficulty: easy
points: 1
maxCommands: 2

inGame:
  story: |
    В ветке feature/dark-mode ты неделю экспериментировал с variables.css — переменные,
    цвета, отступы. В итоге что-то пошло не так: вся раскладка поехала.
    Алёна говорит: "Верни variables.css к тому, что в main, остальное не трогай."
    Переключаться на main и мержить нельзя — там своих изменений ещё на три дня.
  goal: "Восстановить только src/styles/variables.css до версии из main, не трогая другие файлы."

  bank:
    commands: [checkout, restore, reset, show]
    flags: ["--source=main", "--"]
    args: ["main", "src/styles/variables.css"]
    decoys:
      - "git checkout main"
      - "git reset --hard main"
      - "git revert"
      - "git stash"
    prebuilt:
      - "git restore --source=main src/styles/variables.css"
      - "git checkout main -- src/styles/variables.css"

  validSolutions:
    - kind: ideal
      label: "restore --source"
      sequence:
        - step: "git restore --source=main src/styles/variables.css"
    - kind: standard
      label: "checkout -- path"
      sequence:
        - step: "git checkout main -- src/styles/variables.css"

  forbiddenCommands:
    - "git checkout main"
    - "git reset --hard main"

  pointsModifiers:
    bonuses:
      - condition: { type: usesCommand, command: "git restore" }
        points: 1
        reason: "современный restore вместо checkout"
    penalties: []

  hints:
    - "restore умеет тянуть из другой ветки одной командой."

knowledge:
  explanation: |
    git restore --source=<ref> <path> — современный способ заменить файл версией из ref.
    git checkout без -- <path> переключит всю ветку — запрещено в этой задаче.
  solutionsCommentary:
    - solutionLabel: "restore --source"
      commentary: |
        Современный синтаксис: restore с --source явно говорит "возьми файл из этого ref".
        Не переключает ветку, не трогает другие файлы — именно то, что нужно.
    - solutionLabel: "checkout -- path"
      commentary: |
        Старый способ через checkout с двойным тире. Работает так же, но --source
        читается однозначнее. Опасность: без тире checkout main переключит ветку целиком.
  aliases:
    - { from: "git checkout main -- file", to: "git restore --source=main file", note: "Современная альтернатива" }
  relatedKnowledge: [restore-vs-checkout, git-show-paths]
  externalLinks:
    - { title: "git-restore(1)", url: "https://git-scm.com/docs/git-restore" }
